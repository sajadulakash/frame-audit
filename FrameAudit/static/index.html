<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrameAudit</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="access-panel" id="rolePanel">
        <p class="eyebrow">FrameAudit</p>
        <h1>Choose your access</h1>
        <p class="panel-copy">Select how you want to continue.</p>
        <div class="role-actions">
          <button type="button" id="annotatorRoleButton">Continue as Annotator</button>
          <button type="button" id="adminRoleButton" class="secondary-button">Continue as Admin</button>
        </div>
      </section>

      <section class="access-panel" id="userPanel" hidden>
        <button type="button" class="back-button" data-back-to-roles>Back</button>
        <p class="eyebrow">Annotator access</p>
        <h1>Select your folder</h1>
        <p class="panel-copy">Choose your name to start reviewing images.</p>
        <div class="user-buttons" id="userButtons">
          <button type="button" data-user-id="user1">Rouf</button>
          <button type="button" data-user-id="user2">Sabina</button>
          <button type="button" data-user-id="user3">Sabia</button>
          <button type="button" data-user-id="user4">Tanisha</button>
        </div>
        <p class="message error-message" id="userMessage" role="alert"></p>
      </section>

      <section class="access-panel" id="adminLoginPanel" hidden>
        <button type="button" class="back-button" data-back-to-roles>Back</button>
        <p class="eyebrow">Admin access</p>
        <h1>Sign in</h1>
        <form id="adminLoginForm" class="login-form">
          <label for="adminUsername">Username</label>
          <input id="adminUsername" name="username" type="text" autocomplete="username" required />
          <label for="adminPassword">Password</label>
          <input id="adminPassword" name="password" type="password" autocomplete="current-password" required />
          <button type="submit" id="adminLoginButton">Login</button>
        </form>
        <p class="message error-message" id="adminLoginMessage" role="alert"></p>
      </section>

      <section class="access-panel admin-welcome" id="adminPanel" hidden>
        <p class="eyebrow">FrameAudit Admin</p>
        <h1 id="adminWelcomeMessage">Welcome Admin</h1>
        <button type="button" id="adminLogoutButton" class="secondary-button">Log out</button>
      </section>

      <section class="viewer-panel" id="viewerPanel" tabindex="0" hidden>
        <button type="button" class="back-button" id="folderListButton">Folders</button>
        <div class="status-bar">
          <div>
            <p class="eyebrow" id="selectedUserLabel">FrameAudit</p>
            <h1 id="imageName">No image loaded</h1>
          </div>
          <div class="status-metrics">
            <div class="count-badge" id="imageCount">0 / 0</div>
            <div class="count-badge secondary" id="folderCount">0 in folder</div>
          </div>
        </div>

        <div class="image-frame">
          <img id="imageViewer" alt="Selected image" />
          <div class="empty-state" id="emptyState">
            <p>No images found in the configured folder.</p>
          </div>
        </div>

        <p class="message" id="messageBox"></p>

        <div class="controls">
          <button id="previousButton" type="button">Previous</button>
          <button id="deleteButton" type="button" class="danger">Delete</button>
          <button id="undoButton" type="button">Undo</button>
          <button id="nextButton" type="button">Next</button>
        </div>
      </section>
    </main>

    <script src="/static/app.js?v=9"></script>
  </body>
</html>
